name: Deploy TFT Crawler to Oracle Cloud

on:
  push:
    branches: [ master ] # Trigger on every commit to main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '6.0.x' # Or '10.0' if using a preview, though C# 10 uses .NET 6

    - name: Publish App
      # We build a 'Self-Contained' binary so you don't have to install .NET on Oracle
      # This saves RAM on the server. Change linux-x64 to linux-arm64 if using an ARM instance.
      run: |
        dotnet publish TFTStats.Presentation/TFTStats.Presentation.csproj \
        -c Release \
        -r linux-x64 \
        --self-contained true \
        -o ./publish

    - name: Copy Binary to Oracle via SSH
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "./publish/*"
        target: "/home/${{ secrets.REMOTE_USER }}/tft-crawler"
        strip_components: 1

    - name: Restart Crawler Service
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # Make the binary executable
          chmod +x /home/${{ secrets.REMOTE_USER }}/tft-crawler/TFTStats.Presentation
          # Reload and restart the background service
          sudo systemctl daemon-reload
          sudo systemctl restart tft-crawler
          sudo systemctl status tft-crawler --no-pager
